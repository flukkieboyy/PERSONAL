<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLUKKIEBOYY | SYSTEM</title>
    <link rel="short icon" href="https://www.pngall.com/wp-content/uploads/15/Pixelated-Heart-PNG-Picture.png" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <video autoplay loop muted playsinline id="bg-video" class="d-none">
        <source src="https://file.garden/aech34tN8glaOMqR/0421.mp4" type="video/mp4">
    </video>
    <div id="video-overlay" class="d-none"></div>

    <div id="copy-toast" class="pixel-toast d-none">[ COPIED TO CLIPBOARD ]</div>

    <section id="intro-screen" class="vh-100 vw-100 d-flex flex-column justify-content-center align-items-center">
        <div class="terminal-box p-4 p-md-5">
            <h2 class="sys-title mb-4">> SYSTEM_INIT...</h2>
            <p>> IP_ADDRESS: <span id="ip-display" class="glitch-text">Fetching...</span></p>
            <p>> DEVICE_INF: <span id="device-display" class="glitch-text">Analyzing...</span></p>
            <p class="mt-4">> IDENTITY: <span class="text-white blink">STRANGER</span></p>
            <p id="api-status" class="mt-2 text-warning">> CONNECTING_TO_AUDIO_SERVER...</p>
            
            <button id="enter-btn" class="pixel-btn mt-4 d-none">
                [ LOGIN TO SYSTEM ]
            </button>
        </div>
    </section>

    <section id="main-screen" class="vh-100 vw-100 d-none flex-column justify-content-center align-items-center position-relative">
        
        <div id="th-clock" class="pixel-clock position-absolute top-0 end-0 m-3 m-md-4 text-white small-pixel-text">
            [ TH: --:--:-- ]
        </div>

        <div class="content-wrapper text-center z-1 mb-5 pb-5">
            <h1 id="main-name" class="pixel-name mb-4"></h1>
            <h3 id="greeting-text" class="thai-greet text-white fade-transition mb-4">...</h3>
            
            <div class="social-links d-flex justify-content-center gap-3 fade-in-delayed">
                <a href="https://www.youtube.com/@flukkieboyy" target="_blank" class="pixel-btn-icon text-decoration-none">
                    <i class="fab fa-youtube"></i>
                </a>
                <a href="https://www.instagram.com/flukkieboyy/" target="_blank" class="pixel-btn-icon text-decoration-none">
                    <i class="fab fa-instagram"></i>
                </a>
                <button id="discord-btn" class="pixel-btn-icon">
                    <i class="fab fa-discord"></i>
                </button>
            </div>
        </div>

        <div id="music-player-container" class="position-absolute bottom-0 mb-5 p-3 pixel-player z-2" style="bottom: 30px !important;">
            <div class="player-display mb-3 d-flex align-items-center text-start px-2">
                    <span class="text-crimson small-pixel-text me-2" style="white-space: nowrap;">NOW PLAYING:</span>
    
                <div class="marquee-wrapper w-100">
            <div id="song-title" class="text-white small-pixel-text marquee-text">Awaiting System...</div>
        </div>
</div>
            
            <div class="player-controls d-flex justify-content-center gap-3">
                <button id="prev-btn" class="pixel-btn-icon"><i class="fas fa-backward"></i></button>
                <button id="play-btn" class="pixel-btn-icon"><i class="fas fa-play"></i></button>
                <button id="next-btn" class="pixel-btn-icon"><i class="fas fa-forward"></i></button>
            </div>
            
            <div id="yt-player" class="d-none"></div>
        </div>

        <div class="position-absolute bottom-0 w-100 text-center pb-2 z-1">
            <span class="small-pixel-text text-white" style="opacity: 0.7;">Made with ❤️ FLUKKIEBOYY x 1688</span>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
