<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLUKKIEBOYY'S LIVE TV (เฉพาะที่อยากดู)</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    
    <style>
        /* ห้ามเลือกตัวอักษรเพื่อกันคนก๊อปปี้ลิงก์ */
        body { 
            margin: 0; 
            background-color: #000; 
            overflow: hidden; 
            font-family: sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        
        .video-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
        }

        .video-js {
            width: 100% !important;
            height: 100% !important;
        }

        /* --- เทคนิคปรับภาพให้คมชัด (Sharpening) --- */
        .video-js video {
            image-rendering: -webkit-optimize-contrast; /* สำหรับ Chrome/Safari */
            image-rendering: crisp-edges;
            /* เพิ่ม Contrast และ Saturation เล็กน้อยเพื่อให้มิติภาพชัดขึ้น */
            filter: contrast(1.08) saturate(1.1) brightness(1.02);
        }

        /* โลโก้ที่ฝังอยู่ใน Video.js */
        .vjs-custom-logo {
            position: absolute;
            top: 25px;
            right: 25px;
            z-index: 1000; 
            pointer-events: none;
        }

        .vjs-custom-logo img {
            width: 120px;
            height: auto;
            filter: drop-shadow(2px 2px 5px rgba(0,0,0,0.8));
        }

        /* --- หน้าจอ OFFLINE สำหรับโหมด Text --- */
        .offline-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            font-weight: bold;
            z-index: 2000;
            display: none; /* ซ่อนไว้เป็นค่าเริ่มต้น */
            text-align: center;
            text-shadow: 2px 2px 10px rgba(255, 0, 0, 0.8);
        }
    </style>
</head>
<body oncontextmenu="return false;"> 
    
<div class="video-container">
    <div id="offline-ui" class="offline-screen">
        <div>🔴 OFFLINE</div>
        <div style="font-size: 1.2rem; margin-top: 10px; font-weight: normal; color: #ccc;">ขออภัย ไม่สามารถโหลดสัญญาณภาพได้ในขณะนี้</div>
    </div>

    <video
        id="stream-player"
        class="video-js vjs-big-play-centered"
        controls
        preload="auto"
        autoplay
        muted
        playsinline>
        <source src="https://dried-declared.eatmorebanana.org:9305/v5/8rY15r-aA3lW_vnFZDpZMg/1777821836/f73a43e8162bf86ce161da371e572b42/OKNqFSCjnqeTElub7j1mWw/1777832516/live/lx-origin/th-monomax02_720/chunks.m3u8" type="application/x-mpegURL">
    </video>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
    // ==========================================
    // ⚙️ ส่วนตั้งค่าตอนสตรีมเล่นไม่ได้ (Offline Fallback)
    // ==========================================
    const FALLBACK_MODE = "text"; // เลือก: "text" (เพื่อโชว์ตัวหนังสือ) หรือ "video" (เพื่อเล่นคลิปสำรอง)
    
    // ตั้งค่าลิงก์คลิปวิดีโอสำรอง (ทำงานเมื่อเลือก "video")
    const FALLBACK_VIDEO_URL = "https://www.w3schools.com/html/mov_bbb.mp4"; // เปลี่ยนเป็นลิงก์ MP4 หรือ M3U8 สำรองของคุณ
    const FALLBACK_VIDEO_TYPE = "video/mp4"; // ประเภทไฟล์ เช่น "video/mp4" หรือ "application/x-mpegURL"
    // ==========================================

    // --- 1. ระบบความปลอดภัย (ป้องกัน F12 / DevTools) ---
    document.onkeydown = function(e) {
        if(e.keyCode == 123) return false;
        if(e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0))) return false;
        if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
    };

    setInterval(function() {
        var before = new Date().getTime();
        debugger; 
        var after = new Date().getTime();
        if (after - before > 100) { 
            window.location.reload(); 
        }
    }, 1000);

    // --- 2. ตั้งค่าตัวเล่นวิดีโอ ---
    var player = videojs('stream-player', {
        autoplay: 'any',
        fluid: false,
        html5: {
            vhs: {
                enableLowInitialPlaylist: false,
                fastQualityChangeHtml5: true,
                overrideNative: true
            }
        },
        controlBar: {
            children: [
                'playToggle',
                'volumePanel',
                'currentTimeDisplay',
                'timeDivider',
                'durationDisplay',
                'progressControl',
                'liveDisplay',
                'fullscreenToggle',
            ]
        }
    });

    player.ready(function() {
        // สร้างและฝังโลโก้
        var logoContainer = document.createElement('div');
        logoContainer.className = 'vjs-custom-logo';
        logoContainer.innerHTML = '<img src="https://file.garden/aech34tN8glaOMqR/logostream/New%20Project%20(2).png" alt="Logo">';
        player.el().appendChild(logoContainer);

        this.play().catch(function(error) {
            console.log("Autoplay ถูกบล็อกหรือมีปัญหา:", error);
        });
        
        this.on('loadedmetadata', function() {
            const liveThreshold = player.duration() - 20;
            if (player.currentTime() < liveThreshold) {
                player.currentTime(liveThreshold);
            }
        });
    });

    // --- 3. ระบบจับ Error (เมื่อลิงก์หลักเสีย) ---
    player.on('error', function() {
        console.log("⚠️ ลิงก์หลักเสีย หรือไม่สามารถเล่นได้ ทำการโหลดระบบสำรอง...");
        
        if (FALLBACK_MODE === "video") {
            // โหมด: เล่นคลิปสำรอง
            player.error(null); // ล้างแจ้งเตือน error เดิมออกก่อน
            player.src({
                src: FALLBACK_VIDEO_URL,
                type: FALLBACK_VIDEO_TYPE
            });
            player.play();
        } else {
            // โหมด: แสดงตัวหนังสือ OFFLINE
            player.el().style.display = 'none'; // ซ่อนกล่องวิดีโอทิ้งไป
            document.getElementById('offline-ui').style.display = 'flex'; // แสดงหน้าจอตัวหนังสือแทน
        }
    });

    // ป้องกันภาพค้างเวลาสลับหน้าจอ
    document.addEventListener("visibilitychange", function() {
        if (!document.hidden && !player.error()) {
            player.play();
        }
    });
</script>

</body>
</html>
