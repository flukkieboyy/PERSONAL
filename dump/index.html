<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLUKKIEBOYY'S LIVE TV (เฉพาะที่อยากดู)</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    
    <style>
        body { 
            margin: 0; 
            background-color: #000; 
            overflow: hidden; 
            font-family: sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        
        .video-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
        }

        .video-js {
            width: 100% !important;
            height: 100% !important;
        }

        .video-js video {
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            filter: contrast(1.08) saturate(1.1) brightness(1.02);
        }

        .vjs-custom-logo {
            position: absolute;
            top: 25px;
            right: 25px;
            z-index: 1000; 
            pointer-events: none;
        }

        .vjs-custom-logo img {
            width: 120px;
            height: auto;
            filter: drop-shadow(2px 2px 5px rgba(0,0,0,0.8));
        }

        .offline-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            font-weight: bold;
            z-index: 2000;
            display: none; 
            text-align: center;
            text-shadow: 2px 2px 10px rgba(255, 0, 0, 0.8);
        }
    </style>
</head>
<body> 
    
<div class="video-container">
    <div id="offline-ui" class="offline-screen">
        <div>🔴 OFFLINE</div>
        <div style="font-size: 1.2rem; margin-top: 10px; font-weight: normal; color: #ccc;">ขออภัย ไม่สามารถโหลดสัญญาณภาพได้ในขณะนี้</div>
    </div>

    <video
        id="stream-player"
        class="video-js vjs-big-play-centered"
        controls
        preload="auto"
        autoplay
        muted
        playsinline>
    </video>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
    // ==========================================
    // 🤬 โหมดกวนประสาทคนแฮ็ก (Anti-Snoop)
    // ==========================================
    const TROLL_MESSAGE = "ขออภัยแต่ไม่อนุญาติให้เสือกครับ หาเอาเองจุ๊บๆ";

    // 1. พิมพ์ด่าตัวใหญ่ๆ ใน Console เผื่อมันเปิด F12 สำเร็จ
    console.log("%c" + TROLL_MESSAGE, "color: red; font-size: 40px; font-weight: bold; text-shadow: 2px 2px 0px black;");
    console.log("%cพยายามจะหาลิงก์ .m3u8 หรอ? ฝันไปเถอะ! 😜", "color: yellow; font-size: 20px; background: black; padding: 10px;");

    // 2. ดักการคลิกขวา และ Copy ถ้าพยายามทำ ให้เด้งข้อความด่า
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        alert(TROLL_MESSAGE);
    });
    document.addEventListener('copy', function(e) {
        e.preventDefault();
        alert(TROLL_MESSAGE);
    });

    // 3. ปิดคีย์ลัดพวก F12, Ctrl+Shift+I ฯลฯ
    document.onkeydown = function(e) {
        if(e.keyCode == 123) { alert(TROLL_MESSAGE); return false; }
        if(e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0))) { alert(TROLL_MESSAGE); return false; }
        if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { alert(TROLL_MESSAGE); return false; }
    };

    // 4. กับดัก Console (ถ้ามันเปิดได้ เว็บจะค้างหรือรีเฟรช)
    setInterval(function() {
        var before = new Date().getTime();
        debugger; 
        var after = new Date().getTime();
        if (after - before > 100) { 
            document.body.innerHTML = `<h1 style="color:red; text-align:center; margin-top:20%; font-size:50px;">${TROLL_MESSAGE}</h1>`;
        }
    }, 1000);

    // ==========================================
    // 🔐 ระบบเข้ารหัสลิงก์ (Base64) เพื่อซ่อนลิงก์จากหน้า HTML
    // ==========================================
    // นำลิงก์ https://dried-declared.../chunks.m3u8 ของคุณไปแปลงเป็น Base64 ได้ข้อความด้านล่างนี้
    // (ทำให้บอทหรือคนที่หาคำว่า ".m3u8" ในโค้ด หาไม่เจอ)
    const SECRET_STREAM_URL = "aHR0cHM6Ly9ubC51dGFrby5tb2UvcGlnb28vaW5kZXgubTN1OA==";
    
    // โหมดสตรีมเสีย
    const FALLBACK_MODE = "text"; 
    const FALLBACK_VIDEO_URL = ""; 
    const FALLBACK_VIDEO_TYPE = "video/mp4"; 

    // ถอดรหัสลิงก์ตอนจะเล่น
    const decodedStreamUrl = atob(SECRET_STREAM_URL);

    // --- ตั้งค่าตัวเล่นวิดีโอ ---
    var player = videojs('stream-player', {
        autoplay: 'any',
        fluid: false,
        html5: { vhs: { overrideNative: true } },
        controlBar: {
            children: [
                'playToggle', 'volumePanel', 'currentTimeDisplay', 
                'timeDivider', 'durationDisplay', 'progressControl', 
                'liveDisplay', 'fullscreenToggle',
            ]
        }
    });

    player.ready(function() {
        var logoContainer = document.createElement('div');
        logoContainer.className = 'vjs-custom-logo';
        logoContainer.innerHTML = '<img src="https://file.garden/aech34tN8glaOMqR/logostream/New%20Project%20(2).png" alt="Logo">';
        player.el().appendChild(logoContainer);

        // ใส่ลิงก์ที่ถอดรหัสแล้วเข้าไปใน Player (คนอ่านโค้ดดิบๆ จะไม่เห็นลิงก์นี้)
        player.src({
            src: decodedStreamUrl,
            type: 'application/x-mpegURL'
        });

        this.play().catch(function(error) {
            console.log("Autoplay ถูกบล็อก:", error);
        });
        
        this.on('loadedmetadata', function() {
            const liveThreshold = player.duration() - 20;
            if (player.currentTime() < liveThreshold) {
                player.currentTime(liveThreshold);
            }
        });
    });

    player.on('error', function() {
        console.log("⚠️ ลิงก์หลักเสียโหลดระบบสำรอง...");
        if (FALLBACK_MODE === "video" && FALLBACK_VIDEO_URL !== "") {
            player.error(null); 
            player.src({ src: FALLBACK_VIDEO_URL, type: FALLBACK_VIDEO_TYPE });
            player.play();
        } else {
            player.el().style.display = 'none'; 
            document.getElementById('offline-ui').style.display = 'flex'; 
        }
    });

    document.addEventListener("visibilitychange", function() {
        if (!document.hidden && !player.error()) {
            player.play();
        }
    });
</script>

</body>
</html>
